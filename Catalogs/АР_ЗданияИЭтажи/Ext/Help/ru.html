<h1>Справочник "Здания и этажи"</h1>
<p><span lang="RU"><font size="2">Содержит привязку объекта аренды к конкретному адресу, зданию и/или этажу. Справочник может быть полезен для организации дополнительной классификации объектов аренды или для подстановки в печатные формы документов.</font></span></p></body></html>
